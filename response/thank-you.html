<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Grazie ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">
  <style>
    body {
      margin:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      background:#faf7f4;
      font-family:'Montserrat', sans-serif;
      text-align:center;
      padding:20px;
    }
    h1 {
      font-family:'Playfair Display', serif;
    }

    /* Breadcrumb navigation */
    .breadcrumb {
      display: inline-flex;
      align-items: center;
      gap: 0;
      margin: 0 0 24px;
      padding: 10px 20px;
      background: white;
      border-radius: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      font-size: 0.88rem;
      letter-spacing: 0.02em;
    }

    .breadcrumb a {
      text-decoration: none;
      color: #888;
      padding: 4px 2px;
      transition: color 0.2s;
      display: inline-block;
      margin: 0;
      box-shadow: none;
      background: none;
      border-radius: 0;
    }

    .breadcrumb a:hover {
      color: #333;
    }

    .breadcrumb .sep {
      margin: 0 10px;
      color: #ccc;
      font-size: 0.75rem;
      user-select: none;
    }

    .breadcrumb .current {
      color: #333;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <nav class="breadcrumb">
    <a href="https://federicoerandika-max.github.io/weddingDay/" id="backHome"></a>
    <span class="sep">›</span>
    <span class="current" id="breadcrumbCurrent"></span>
  </nav>

  <div>
    <h1 id="title"></h1>
    <p id="text"></p>
  </div>

<script>
const lang = (navigator.language || '').startsWith('en') ? 'en' : 'it';

const t = {
  it: {
    title: "Grazie di cuore ❤️",
    text: "Abbiamo ricevuto la tua conferma. Non vediamo l'ora di festeggiare insieme!",
    backHome: "Home",
    breadcrumbCurrent: "Conferma"
  },
  en: {
    title: "Thank you ❤️",
    text: "We've received your confirmation. We can't wait to celebrate together!",
    backHome: "Home",
    breadcrumbCurrent: "Confirmation"
  }
};

document.getElementById('title').innerHTML = t[lang].title;
document.getElementById('text').innerHTML = t[lang].text;
document.getElementById('backHome').textContent = t[lang].backHome;
document.getElementById('breadcrumbCurrent').textContent = t[lang].breadcrumbCurrent;
</script>
</body>
</html>
