        e_speeches_d: "රාත්‍රී භෝජනය අතරතුර කැප වූ මොහොතක්.",
        e_cake: "කේක් කැපීම",
        e_cake_d: "ඡායාරූප සහ කේක්!",

        e_party_d: "නැටුම් පිටිය විවෘතයි!"

    // STESSA logica lingua del tuo index (localStorage 'lang', detectLanguage, applyLanguage, setLanguage) [file:47]
    let globalLanguage;

    function detectLanguage() {
      const saved = localStorage.getItem('lang');
      if (saved) return saved;
      const browserLang = navigator.language || navigator.userLanguage;
      if (browserLang && browserLang.startsWith('si')) return 'si';
      return browserLang && browserLang.startsWith('en') ? 'en' : 'it';
    }

    function setLanguage(lang) {
      localStorage.setItem('lang', lang);
      applyLanguage(lang);
      renderTimeline();   // aggiorna anche titoli/desc eventi
      updateNow();        // e i testi "Now/Next"
    }

    // Orari “puliti” dal CSV: solo ciò che serve agli invitati. [file:31]
    const scheduleBase = [
      { start: "15:25", end: "15:30", key: "takeSeat" }, // confermato
      { start: "16:20", end: "17:00", key: "ceremony" }, // confermato
      { start: "17:00", end: "17:15", key: "lamp" }, // confermato
      { start: "17:15", end: "18:30", key: "aperitif" }, // confermato
      { start: "18:30", end: "19:00", key: "champagne" },
      { start: "19:00", end: "19:15", key: "room" }, 
      { start: "19:15", end: "21:30", key: "dinner" },
      { start: "20:00", end: "20:35", key: "speeches" },
      { start: "22:00", end: "22:30", key: "cake" },
      { start: "22:00", end: "23:00", key: "sweets" },
      { start: "22:30", end: "01:00", key: "party" }
    ];

    function toMin(hhmm) {
      const [h,m] = hhmm.split(":").map(Number);
      return h*60 + m;
    }

    function range(e) { return `${e.start}–${e.end}`; }

    function getScheduleLocalized() {
      const t = translations[globalLanguage];
      const map = {
        takeSeat: { title: t.e_takeSeat, desc: t.e_takeSeat_d },
        ceremony: { title: t.e_ceremony, desc: t.e_ceremony_d },
        lamp: { title: t.e_lamp, desc: t.e_lamp_d },
        aperitif: { title: t.e_aperitif, desc: t.e_aperitif_d },
        champagne: { title: t.e_champagne, desc: t.e_champagne_d },
        room: { title: t.e_room, desc: t.e_room_d },
        dinner: { title: t.e_dinner, desc: t.e_dinner_d },
        speeches: { title: t.e_speeches, desc: t.e_speeches_d },
        cake: { title: t.e_cake, desc: t.e_cake_d },
        sweets: { title: t.e_sweets, desc: t.e_sweets_d },
        party: { title: t.e_party, desc: t.e_party_d },
      };

      return scheduleBase.map(e => ({
        ...e,
        title: map[e.key].title,
        desc: map[e.key].desc
      }));
    }

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      globalLanguage = lang;

      const t = translations[lang];
      document.getElementById('programTitle').innerHTML = t.programTitle;
      document.getElementById('programIntro').innerHTML = t.programIntro;
      document.getElementById('backHome').textContent = t.backHome;
      document.getElementById('breadcrumbCurrent').textContent = t.breadcrumbCurrent;
      document.getElementById('nowLabel').innerHTML = t.nowLabel;
      document.getElementById('timelineTitle').innerHTML = t.timelineTitle;
      document.getElementById('footerText').innerHTML = t.footer;
      document.getElementById('poruwaCtaText').innerHTML = t.poruwaCta;
    }

    function renderTimeline() {
      const schedule = getScheduleLocalized();
      const el = document.getElementById("timeline");
      el.innerHTML = schedule.map((e,i)=>`
        <div class="tl-row" data-i="${i}">
          <div class="tl-time">${range(e)}</div>
          <div>
            <div class="tl-title">${e.title}</div>
            <div class="tl-desc">${e.desc}</div>
          </div>
        </div>
      `).join("");
    }

    function updateNow() {
      const schedule = getScheduleLocalized();
      const now = new Date();
      const mn = now.getHours()*60 + now.getMinutes();

      let current = null;
      let next = null;

      for (const e of schedule) {
        const s = toMin(e.start);
        const en = toMin(e.end);
        if (mn >= s && mn <= en) current = e;
        if (mn < s && !next) next = e;
      }

      const waitingText = { it: "In attesa del prossimo momento", en: "Waiting for the next moment", si: "ඊළඟ මොහොත සඳහා බලා සිටිනවා" };
      document.getElementById("nowEvent").textContent =
        current ? `${current.title} (${range(current)})` : (waitingText[globalLanguage] || waitingText.en);

      const t = translations[globalLanguage];
      const endText = { it: "Prossimo: fine festa", en: "Next: end of party", si: "ඊළඟ: සාදය අවසානය" };
      document.getElementById("nextEvent").textContent =
        next ? `${t.nextPrefix} ${next.title} — ${next.start}` : (endText[globalLanguage] || endText.en);

      document.querySelectorAll(".tl-row").forEach(row => row.classList.remove("is-now"));
      if (current) {
        const idx = schedule.findIndex(x => x.key === current.key && x.start === current.start);
        const row = document.querySelector(`.tl-row[data-i="${idx}"]`);
        if (row) row.classList.add("is-now");
      }

      // Mostra il bottone Poruwa solo durante la cerimonia
      const poruwaCta = document.getElementById('poruwaCta');
      if (current && (current.key === 'ceremony' || current.key === 'lamp')) {
        poruwaCta.classList.remove('hidden');
      } else {
        poruwaCta.classList.add('hidden');
      }
    }

    // INIT (stesso pattern: applyLanguage(detectLanguage())) [file:47]
    applyLanguage(detectLanguage());
    renderTimeline();
    updateNow();
    setInterval(updateNow, 30000);
  </script>
