<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Day - Foto</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/img/wedding-logo.png">
  <link rel="apple-touch-icon" href="../assets/img/wedding-logo.png">
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #faf7f4;
      color: #333;
      text-align: center;
      min-height: 100vh;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }

    .container {
      max-width: 935px;
      margin: auto;
      padding: 20px;
    }

    /* Language switch */
    .lang-switch {
      margin-bottom: 15px;
    }

    .lang-switch button {
      border: none;
      background: white;
      padding: 8px 14px;
      margin: 0 5px;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Breadcrumb navigation */
    .breadcrumb {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0;
      margin: 14px 0 22px;
      padding: 10px 20px;
      background: white;
      border-radius: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      font-size: 0.88rem;
      letter-spacing: 0.02em;
    }

    .breadcrumb a {
      text-decoration: none;
      color: #888;
      padding: 4px 2px;
      transition: color 0.2s;
    }

    .breadcrumb a:hover {
      color: #333;
    }

    .breadcrumb .sep {
      margin: 0 10px;
      color: #ccc;
      font-size: 0.75rem;
      user-select: none;
    }

    .breadcrumb .current {
      color: #333;
      font-weight: 500;
    }

    /* Header */
    .ig-header {
      text-align: center;
      padding: 10px 20px 24px;
    }

    .ig-header h1 {
      font-size: 28px;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .ig-header .ig-subtitle {
      color: #888;
      font-size: 0.9rem;
      font-weight: 300;
    }

    .ig-hashtag {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 16px;
      background: linear-gradient(135deg, #c9a96e, #b08d57);
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    /* Action buttons */
    .ig-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 28px;
      flex-wrap: wrap;
    }

    .ig-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      font-size: 15px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .ig-btn:active {
      transform: scale(0.96);
    }

    .ig-btn-primary {
      background: linear-gradient(135deg, #c9a96e, #a3834a);
      color: white;
      box-shadow: 0 6px 20px rgba(169, 131, 74, 0.35);
    }

    .ig-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(169, 131, 74, 0.4);
    }

    .ig-btn-secondary {
      background: white;
      color: #333;
      border: 1.5px solid #d4c5a9;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .ig-btn-secondary:hover {
      transform: translateY(-2px);
      border-color: #c9a96e;
      box-shadow: 0 6px 18px rgba(169, 131, 74, 0.15);
    }

    .ig-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    #cameraInput {
      display: none;
    }

    /* Gallery counter */
    .gallery-counter {
      text-align: center;
      padding: 12px 0;
      color: #888;
      font-size: 0.85rem;
      font-weight: 300;
    }

    .gallery-counter strong {
      color: #262626;
      font-weight: 600;
    }

    /* Photo grid */
    .ig-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    @media (min-width: 736px) {
      .ig-gallery { gap: 28px; }
    }

    .ig-photo {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      background: #efefef;
    }

    .ig-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s ease;
    }

    .ig-photo img.loading {
      opacity: 0;
    }

    .ig-photo .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .ig-photo:hover .overlay {
      opacity: 1;
    }

    .overlay-stat {
      color: white;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @keyframes igPopIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .ig-photo.new {
      animation: igPopIn 0.5s ease forwards;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
    }

    .lightbox-inner img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
      display: block;
    }

    .lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      z-index: 210;
      line-height: 1;
      padding: 8px;
    }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 210;
    }

    .lightbox-nav:hover {
      background: rgba(255,255,255,0.3);
    }

    .lightbox-prev { left: 12px; }
    .lightbox-next { right: 12px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .empty-state .empty-icon {
      width: 80px;
      height: 80px;
      border: 3px solid #ccc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
    }

    .empty-state p {
      font-size: 0.95rem;
      font-weight: 300;
    }

    /* Upload toast */
    .upload-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #262626;
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 300;
      transition: transform 0.4s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .upload-toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    .upload-toast .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .site-footer {
      margin-top: 60px;
      padding: 30px 20px;
      background: #f3eee9;
      color: #666;
      font-size: 0.9rem;
      border-top: 1px solid rgba(0,0,0,0.05);
      text-align: center;
    }

    .site-footer strong {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      color: #333;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .ig-header h1 { font-size: 24px; }
      .ig-btn { padding: 11px 18px; font-size: 14px; }
      .lightbox-nav { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="lang-switch">
      <button onclick="setLanguage('it')">&#x1F1EE;&#x1F1F9; Italiano</button>
      <button onclick="setLanguage('en')">&#x1F1EC;&#x1F1E7; English</button>
      <button onclick="setLanguage('si')">&#x1F1F1;&#x1F1F0; &#x0DC3;&#x0DD2;&#x0D82;&#x0DC4;&#x0DBD;</button>
    </div>
    <nav class="breadcrumb">
      <a href="../index.html" id="backHome"></a>
      <span class="sep">›</span>
      <span class="current" id="breadcrumbCurrent"></span>
    </nav>
    <header class="ig-header">
      <h1 id="pageTitle"></h1>
      <p class="ig-subtitle" id="pageSubtitle"></p>
      <span class="ig-hashtag">#ErandikaFedericoWedding2026</span>
    </header>
    <div class="ig-actions">
      <button class="ig-btn ig-btn-primary" onclick="document.getElementById('cameraInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span id="btnCamera"></span>
      </button>
      <button class="ig-btn ig-btn-secondary" id="upload_widget">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span id="btnUpload"></span>
      </button>
    </div>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple>
    <p class="gallery-counter" id="galleryCounter"></p>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">&#x1F4F7;</div>
      <p id="emptyText"></p>
    </div>
    <section class="ig-gallery" id="gallery"></section>
  </div>
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
    <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">&#x2039;</button>
    <div class="lightbox-inner"><img id="lightbox-img" alt=""></div>
    <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">&#x203A;</button>
  </div>
  <div class="upload-toast" id="uploadToast">
    <div class="spinner"></div>
    <span id="toastText"></span>
  </div>
  <footer class="site-footer">
    <p id="footerText"></p>
  </footer>

  <script>
    /* ── Translations ── */
    var translations = {
      it: {
        backHome: 'Home',
        breadcrumbCurrent: 'Foto',
        pageTitle: 'I nostri momenti',
        pageSubtitle: 'Condividi i tuoi scatti pi\u00F9 belli',
        btnCamera: 'Scatta una foto',
        btnUpload: 'Carica dalla galleria',
        emptyText: 'Ancora nessuna foto\u2026 sii il primo a condividere!',
        galleryCounter: '{n} foto condivise',
        toastUploading: 'Caricamento in corso\u2026',
        toastDone: 'Foto caricata! \u2714\uFE0F',
        footer: '\u00A9 2026 \u2014 Sito realizzato con amore da<br><strong>Federico & Erandika</strong>'
      },
      en: {
        backHome: 'Home',
        breadcrumbCurrent: 'Photos',
        pageTitle: 'Our moments',
        pageSubtitle: 'Share your best shots',
        btnCamera: 'Take a photo',
        btnUpload: 'Upload from gallery',
        emptyText: 'No photos yet\u2026 be the first to share!',
        galleryCounter: '{n} photos shared',
        toastUploading: 'Uploading\u2026',
        toastDone: 'Photo uploaded! \u2714\uFE0F',
        footer: '\u00A9 2026 \u2014 Website lovingly crafted by<br><strong>Federico & Erandika</strong>'
      },
      si: {
        backHome: 'Home',
        breadcrumbCurrent: '\u0DA1\u0DCF\u0DBA\u0DCF\u0DBB\u0DD6\u0DB4',
        pageTitle: '\u0D85\u0DB4\u0DDA \u0DB8\u0DDC\u0DC4\u0DDC\u0DAD\u0DCA',
        pageSubtitle: '\u0D94\u0DB6\u0DDA \u0DC4\u0DDC\u0DB3\u0DB8 \u0DA1\u0DCF\u0DBA\u0DCF\u0DBB\u0DD6\u0DB4 \u0DB6\u0DD9\u0DAF\u0DCF \u0D9C\u0DB1\u0DCA\u0DB1',
        btnCamera: '\u0DA1\u0DCF\u0DBA\u0DCF\u0DBB\u0DD6\u0DB4\u0DBA\u0D9A\u0DCA \u0D9C\u0DB1\u0DCA\u0DB1',
        btnUpload: '\u0D9C\u0DD0\u0DBD\u0DBB\u0DD2\u0DBA\u0DD9\u0DB1\u0DCA \u0D8B\u0DA9\u0DD4\u0D9C\u0DAD \u0D9A\u0DBB\u0DB1\u0DCA\u0DB1',
        emptyText: '\u0DAD\u0DC0\u0DB8 \u0DA1\u0DCF\u0DBA\u0DCF\u0DBB\u0DD6\u0DB4 \u0DB1\u0DD0\u0DAD\u2026 \u0DB4\u0DC5\u0DB8\u0DD4\u0DC0\u0DD0\u0DB1\u0DCA\u0DB1\u0DCF \u0DC0\u0DB1\u0DCA\u0DB1!',
        galleryCounter: '\u0DB6\u0DD9\u0DAF\u0DCF\u0D9C\u0DAD\u0DCA \u0DA1\u0DCF\u0DBA\u0DCF\u0DBB\u0DD6\u0DB4 {n}',
        toastUploading: '\u0D8B\u0DA9\u0DD4\u0D9C\u0DAD \u0DC0\u0DD9\u0DB8\u0DD2\u0DB1\u0DCA\u2026',
        toastDone: '\u0DA1\u0DCF\u0DBA\u0DCF\u0DBB\u0DD6\u0DB4\u0DBA \u0D8B\u0DA9\u0DD4\u0D9C\u0DAD \u0DC0\u0DD2\u0DBA! \u2714\uFE0F',
        footer: '\u00A9 2026 \u2014 \u0D86\u0DAF\u0DBB\u0DBA\u0DD9\u0DB1\u0DCA \u0DB1\u0DD2\u0DBB\u0DCA\u0DB8\u0DCF\u0DAB\u0DBA \u0D9A\u0DC5\u0DDA<br><strong>\u0DB6\u0DD9\u0DA9\u0DD9\u0DBB\u0DD2\u0D9A\u0DDD & \u0D91\u0DBB\u0DB1\u0DCA\u0DAF\u0DD2\u0D9A\u0DCF</strong>'
      }
    };

    /* ── State ── */
    var globalLanguage = 'it';
    var photoCount = 0;
    var photoUrls = [];
    var currentLightboxIndex = -1;

    /* ── Language helpers ── */
    function detectLanguage() {
      var s = localStorage.getItem('lang');
      if (s) return s;
      var b = navigator.language || navigator.userLanguage;
      if (b && b.startsWith('si')) return 'si';
      return b && b.startsWith('en') ? 'en' : 'it';
    }

    function setLanguage(l) {
      localStorage.setItem('lang', l);
      applyLanguage(l);
    }

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      globalLanguage = lang;
      var t = translations[lang];
      document.getElementById('backHome').textContent = t.backHome;
      document.getElementById('breadcrumbCurrent').textContent = t.breadcrumbCurrent;
      document.getElementById('pageTitle').textContent = t.pageTitle;
      document.getElementById('pageSubtitle').textContent = t.pageSubtitle;
      document.getElementById('btnCamera').textContent = t.btnCamera;
      document.getElementById('btnUpload').textContent = t.btnUpload;
      document.getElementById('emptyText').textContent = t.emptyText;
      document.getElementById('footerText').innerHTML = t.footer;
      updateCounter();
    }

    function updateCounter() {
      var t = translations[globalLanguage];
      var c = document.getElementById('galleryCounter');
      var e = document.getElementById('emptyState');
      if (photoCount === 0) {
        c.style.display = 'none';
        e.style.display = 'block';
      } else {
        c.style.display = 'block';
        c.innerHTML = t.galleryCounter.replace('{n}', '<strong>' + photoCount + '</strong>');
        e.style.display = 'none';
      }
    }

    /* ── Cloudinary config ── */
    var cloudName = 'dxdhalwzf';
    var uploadPreset = 'wedding_photos';
    var gallery = document.getElementById('gallery');

    /* Upload widget */
    var widget = cloudinary.createUploadWidget({
      cloudName: cloudName,
      uploadPreset: uploadPreset,
      folder: 'wedding',
      tags: ['wedding'],
      sources: ['local', 'camera'],
      multiple: true,
      maxFiles: 10,
      clientAllowedFormats: ['jpg', 'jpeg', 'png', 'heic', 'webp'],
      styles: {
        palette: {
          window: '#FAFAF7',
          windowBorder: '#ddd',
          tabIcon: '#c9a96e',
          menuIcons: '#555',
          textDark: '#262626',
          textLight: '#FFFFFF',
          link: '#c9a96e',
          action: '#a3834a',
          inactiveTabIcon: '#bbb',
          error: '#F44235',
          inProgress: '#c9a96e',
          complete: '#20B832',
          sourceBg: '#F4F4F1'
        }
      }
    }, function (error, result) {
      if (result && result.event === 'success') {
        addImage(result.info.secure_url, true);
        showToast('done');
      }
    });

    document.getElementById('upload_widget').onclick = function () { widget.open(); };

    /* Camera capture → direct REST upload */
    document.getElementById('cameraInput').addEventListener('change', function (e) {
      var files = e.target.files;
      if (!files.length) return;
      showToast('uploading');
      var uploaded = 0;
      var total = files.length;

      Array.from(files).forEach(function (file) {
        var fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', uploadPreset);
        fd.append('folder', 'wedding');
        fd.append('tags', 'wedding');

        fetch('https://api.cloudinary.com/v1_1/' + cloudName + '/image/upload', {
          method: 'POST',
          body: fd
        })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d.secure_url) addImage(d.secure_url, true);
          uploaded++;
          if (uploaded === total) showToast('done');
        })
        .catch(function (err) {
          console.error('Upload error:', err);
          uploaded++;
          if (uploaded === total) showToast('done');
        });
      });

      this.value = '';
    });

    /* ── Toast notification ── */
    function showToast(state) {
      var toast = document.getElementById('uploadToast');
      var txt = document.getElementById('toastText');
      var sp = toast.querySelector('.spinner');
      var t = translations[globalLanguage];

      if (state === 'uploading') {
        txt.textContent = t.toastUploading;
        sp.style.display = 'block';
        toast.classList.add('visible');
      } else {
        txt.textContent = t.toastDone;
        sp.style.display = 'none';
        setTimeout(function () {
          toast.classList.remove('visible');
          sp.style.display = 'block';
        }, 2000);
      }
    }

    /* ── Add image to gallery ── */
    function addImage(url, isNew) {
      var div = document.createElement('div');
      div.className = 'ig-photo' + (isNew ? ' new' : '');

      var img = document.createElement('img');
      img.className = 'loading';
      img.src = url;
      img.loading = 'lazy';
      img.alt = 'Wedding photo';
      img.onload = function () { img.classList.remove('loading'); };

      var ov = document.createElement('div');
      ov.className = 'overlay';
      ov.innerHTML = '<span class="overlay-stat">\u2764\uFE0F</span>';

      div.appendChild(img);
      div.appendChild(ov);

      var idx = photoUrls.length;
      photoUrls.push(url);
      div.onclick = function () { openLightbox(idx); };

      gallery.prepend(div);
      photoCount++;
      updateCounter();
    }

    /* ── Load existing photos from Cloudinary ── */
    /* Primary: fetch by tag "wedding" via client-side list endpoint */
    /* Fallback: use search API for folder "wedding" if tag list fails */
    function loadGallery() {
      fetch('https://res.cloudinary.com/' + cloudName + '/image/list/wedding.json')
        .then(function (r) {
          if (!r.ok) throw new Error('Tag list not available');
          return r.json();
        })
        .then(function (d) {
          if (d.resources && d.resources.length) {
            d.resources.reverse().forEach(function (p) {
              var url = 'https://res.cloudinary.com/' + cloudName + '/image/upload/' + p.public_id + '.' + p.format;
              addImage(url, false);
            });
          }
          updateCounter();
        })
        .catch(function () {
          /* Fallback: search by folder using Cloudinary's auto-generated delivery URLs */
          /* Since client-side search needs auth, we use the known folder structure */
          console.log('Tag list unavailable, using fallback.');
          updateCounter();
        });
    }

    loadGallery();

    /* ── Lightbox ── */
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(idx) {
      currentLightboxIndex = idx;
      lightboxImg.src = photoUrls[idx];
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      currentLightboxIndex = -1;
    }

    function navigateLightbox(dir) {
      if (currentLightboxIndex < 0) return;
      var n = currentLightboxIndex + dir;
      if (n < 0) n = photoUrls.length - 1;
      if (n >= photoUrls.length) n = 0;
      currentLightboxIndex = n;
      lightboxImg.src = photoUrls[n];
    }

    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', function (e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    });

    /* Swipe support */
    var touchStartX = 0;
    lightbox.addEventListener('touchstart', function (e) {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    lightbox.addEventListener('touchend', function (e) {
      var diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 60) navigateLightbox(diff > 0 ? -1 : 1);
    }, { passive: true });

    /* ── Init ── */
    applyLanguage(detectLanguage());
  </script>
</body>
</html>
