    };

    let globalLanguage;

    function detectLanguage() {
      const saved = localStorage.getItem('lang');
      if (saved) return saved;
      const browserLang = navigator.language || navigator.userLanguage;
      if (browserLang && browserLang.startsWith('si')) return 'si';
      return browserLang && browserLang.startsWith('en') ? 'en' : 'it';
    }

    function setLanguage(lang) {
      localStorage.setItem('lang', lang);
      applyLanguage(lang);
    }

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      globalLanguage = lang;

      const t = translations[lang];
      document.getElementById('pageTitle').innerHTML = t.pageTitle;
      document.getElementById('backHome').textContent = t.backHome;
      document.getElementById('breadcrumbCurrent').textContent = t.breadcrumbCurrent;
      document.getElementById('pageIntro').innerHTML = t.pageIntro;
      document.getElementById('footerText').innerHTML = t.footer;

      // Mostra crumb "Timeline" solo se l'utente arriva dalla timeline
      const fromTimeline = document.referrer && document.referrer.includes('timeline');
      document.getElementById('backTimeline').textContent = t.backTimeline;
      document.getElementById('backTimeline').style.display = fromTimeline ? 'inline' : 'none';
      document.getElementById('sepTimeline').style.display = fromTimeline ? 'inline' : 'none';

      // Render steps
      const container = document.getElementById('stepsContainer');
      container.innerHTML = t.steps.map((step, i) => `
        <div class="step">
          <div class="step-number">${i + 1}</div>
          <div class="step-title">${step.title}</div>
          <div class="step-desc">${step.desc}</div>
        </div>
      `).join('');
    }

    // INIT
    applyLanguage(detectLanguage());
  </script>
